[theme]
primaryColor        = "#FF5FA2"
backgroundColor     = "#3D1030"
secondaryBackgroundColor = "#2A0820"
textColor           = "#FFE4F1"
font                = "sans serif"

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 10

[browser]
gatherUsageStats    = false
